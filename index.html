<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>star</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }

        .hello {
            font-size: 80px;
            font-style: italic;
            font-weight: 300;
            color: #fff;
            opacity: 0;
            animation: typeWrite 2s ease-out forwards;
        }

        @keyframes typeWrite {
            to {
                opacity: 1;
            }
        }

        .intro {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            opacity: 0;
            animation: slideIn 1.5s ease-out 2s forwards;
        }

        .intro-text {
            font-size: 24px;
            color: #d1d5db;
        }

        .name-star {
            position: relative;
            background: linear-gradient(90deg, #fbbf24, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 24px;
            font-weight: 600;
        }

        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fbbf24;
            border-radius: 50%;
            animation: sparkleAnim 1.5s ease-in-out infinite;
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .about-section {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
            padding: 80px 0;
        }

        .section-title {
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 30px;
        }

        .about-text {
            font-size: 18px;
            line-height: 1.8;
            color: #d1d5db;
            max-width: 600px;
        }

        .highlight {
            color: #fbbf24;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }

        .underline {
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: #fbbf24;
            border-radius: 1px;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 60px;
            padding-bottom: 40px;
            justify-content: center;
        }

        .nav-button {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-button:hover {
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
            transform: translateY(-2px);
        }

        .projects-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 80px 0;
        }

        .section-subtitle {
            color: #9ca3af;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .projects-empty {
            font-size: 20px;
            color: #d1d5db;
            margin-top: 20px;
        }

        .contribution-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 40px;
            margin-bottom: 80px;
        }

        .contribution-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .contribution-card:hover {
            background: rgba(251, 191, 36, 0.1);
            border-color: #fbbf24;
            transform: translateY(-4px);
        }

        .contribution-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .contribution-desc {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .contribution-role {
            color: #d1d5db;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .contribution-role strong {
            color: #fff;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fbbf24;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 40px;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            gap: 12px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .hello {
                font-size: 48px;
            }

            .intro-text,
            .name-star {
                font-size: 18px;
            }

            .section-title {
                font-size: 28px;
            }

            .about-text {
                font-size: 16px;
            }

            .contribution-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Home Page -->
        <section class="hero" id="heroSection">
            <div class="hello">hello</div>
            <div class="intro">
                <span class="intro-text">My name is</span>
                <div class="name-star">
                    star
                    <div class="sparkles" id="sparklesContainer"></div>
                </div>
            </div>
        </section>

        <section class="about-section" id="aboutSection">
            <h2 class="section-title">About Me</h2>
            <p class="about-text">
                I'm a <span class="highlight">15 year old<span class="underline"></span></span> 
                <span class="highlight">dumb<span class="underline"></span></span> girl that has 
                <span class="highlight">0 creativity<span class="underline"></span></span> at all
            </p>

            <div class="nav-buttons">
                <button class="nav-button" id="homeBtn" title="Home">🏠</button>
                <button class="nav-button" id="projectsBtn" title="Projects">🔧</button>
                <button class="nav-button" id="githubBtn" title="GitHub" onclick="window.open('https://github.com', '_blank')">🐙</button>
                <button class="nav-button" id="discordBtn" title="Discord" onclick="window.open('https://discord.com', '_blank')">💬</button>
            </div>
        </section>

        <!-- Projects & Contributions Page -->
        <section class="projects-page" id="projectsPage" class="hidden">
            <a href="#" class="back-button" onclick="navigateTo('home'); return false;">← Back</a>

            <div>
                <h2 class="section-title">Projects</h2>
                <p class="section-subtitle">A collection of things I've built.</p>
                <p class="projects-empty">None so far</p>
            </div>

            <div style="margin-top: 80px;">
                <h2 class="section-title">Contributions</h2>
                <p class="section-subtitle">Projects I've contributed to.</p>

                <div class="contribution-grid">
                    <div class="contribution-card">
                        <div class="contribution-title">Sample Project</div>
                        <div class="contribution-desc">A sample contribution to demonstrate the layout.</div>
                        <div class="contribution-role">Role: <strong>Contributor</strong></div>
                        <div class="tags">
                            <span class="tag">Lua</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-buttons">
                <button class="nav-button" id="homeBtn2" title="Home">🏠</button>
                <button class="nav-button" id="projectsBtn2" title="Projects">🔧</button>
                <button class="nav-button" id="githubBtn2" title="GitHub" onclick="window.open('https://github.com', '_blank')">🐙</button>
                <button class="nav-button" id="discordBtn2" title="Discord" onclick="window.open('https://discord.com', '_blank')">💬</button>
            </div>
        </section>
    </div>

    <script>
        function createSparkles() {
            const container = document.getElementById('sparklesContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                
                const angle = (i / 8) * Math.PI * 2;
                const distance = 25;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                sparkle.style.left = (50 + x) + '%';
                sparkle.style.top = (50 + y) + '%';
                sparkle.style.animationDelay = (i * 0.15) + 's';
                
                container.appendChild(sparkle);
            }
        }

        function navigateTo(section) {
            document.getElementById('heroSection').classList.add('hidden');
            document.getElementById('aboutSection').classList.add('hidden');
            document.getElementById('projectsPage').classList.add('hidden');

            if (section === 'home') {
                document.getElementById('heroSection').classList.remove('hidden');
                document.getElementById('aboutSection').classList.remove('hidden');
            } else if (section === 'projects') {
                document.getElementById('projectsPage').classList.remove('hidden');
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('homeBtn').addEventListener('click', () => navigateTo('home'));
        document.getElementById('projectsBtn').addEventListener('click', () => navigateTo('projects'));

        document.getElementById('homeBtn2').addEventListener('click', () => navigateTo('home'));
        document.getElementById('projectsBtn2').addEventListener('click', () => navigateTo('projects'));

        createSparkles();
    </script>
</body>
</html>
