<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>star - home</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/mmfpBkh.jpeg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .background-stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .bg-star {
            position: absolute;
            font-size: 120px;
            animation: color-flicker 1s infinite;
            opacity: 0.6;
        }

        @keyframes color-flicker {
            0%, 100% { color: #ffffff; }
            25% { color: #ff00ff; }
            50% { color: #00ffff; }
            75% { color: #ffff00; }
        }

        svg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 50;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid white;
            position: sticky;
            top: 0;
            z-index: 100;
            background: black;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            animation: slideInLeft 0.8s ease;
        }

        .star-symbol {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: rotate-star 4s linear infinite, pulse-star 2s ease-in-out infinite;
        }

        @keyframes rotate-star {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse-star {
            0%, 100% { text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
            50% { text-shadow: 0 0 20px rgba(168, 85, 247, 0.8); }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: #d1d5db;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-links a:hover {
            color: #a855f7;
        }

        .hero {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            flex: 1;
            gap: 60px;
            padding: 60px 0;
        }

        .hero-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex: 1;
            max-width: 500px;
        }

        .star-title {
            position: relative;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .star-title h1 {
            font-size: 72px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 1s ease;
            letter-spacing: 2px;
        }

        .avatar-small {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            animation: fadeInDown 1s ease 0.1s both;
            transition: all 0.3s ease;
        }

        .avatar-small:hover {
            transform: scale(1.1);
        }

        .star-title::before {
            content: '⭐';
            position: absolute;
            font-size: 40px;
            left: -60px;
            animation: bounce 2s ease-in-out infinite;
            top: -10px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .tagline {
            font-size: 24px;
            color: #a9b1d6;
            max-width: 600px;
            animation: fadeInUp 1s ease 0.2s both;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tagline::after {
            content: ':3';
            font-size: 20px;
        }

        .bio {
            font-size: 16px;
            color: #d1d5db;
            max-width: 700px;
            line-height: 1.8;
            animation: fadeInUp 1s ease 0.3s both;
        }

        .tech-stack {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease 0.4s both;
        }

        .tech-badge {
            background: black;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: default;
        }

        .tech-badge:hover {
            background: white;
            color: black;
        }

        .cta-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease 0.5s both;
        }

        .btn {
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid white;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: white;
            color: black;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: black;
            color: white;
        }

        .btn-secondary {
            background: black;
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: white;
            color: black;
        }

        .social-section {
            display: flex;
            gap: 25px;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .social-link {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            border: 2px solid white;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 24px;
            overflow: hidden;
        }

        .social-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .social-link:hover {
            transform: translateY(-3px) scale(1.1);
        }

        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeInRight 1s ease 0.3s both;
        }

        .info-container {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid white;
        }

        .info-text {
            width: 100%;
            height: 100%;
            background: black;
            border-radius: 20px;
            padding: 30px;
            overflow-y: auto;
        }

        .info-text::-webkit-scrollbar {
            width: 6px;
        }

        .info-text::-webkit-scrollbar-track {
            background: transparent;
        }

        .info-text::-webkit-scrollbar-thumb {
            background: white;
            border-radius: 3px;
        }

        .info-text::-webkit-scrollbar-thumb:hover {
            background: white;
        }

        .info-text p {
            color: #d1d5db;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 15px;
        }

        .info-text p:last-child {
            margin-bottom: 0;
        }

        .bouncing-image {
            position: fixed;
            width: 80px;
            height: 80px;
            border-radius: 15px;
            object-fit: cover;
            pointer-events: none;
            z-index: 5;
        }

        .meteor {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .meteor::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8), transparent);
            top: 4px;
            left: 1px;
        }

        @media (max-width: 1024px) {
            .hero {
                flex-direction: column;
                gap: 40px;
            }

            .hero-content {
                align-items: center;
                text-align: center;
            }

            .star-title {
                justify-content: center;
            }

            .star-title::before {
                left: -50px;
            }

            .cta-buttons {
                justify-content: center;
            }

            .social-section {
                justify-content: center;
            }

            .info-section {
                max-width: 600px;
                margin: 0 auto;
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 42px;
            }

            .tagline {
                font-size: 18px;
            }

            .star-title::before {
                font-size: 24px;
                left: -40px;
            }

            .nav-links {
                gap: 10px;
            }

            .nav-links a {
                font-size: 12px;
            }

            .cta-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .info-section {
                max-width: 100%;
            }

            .info-text {
                height: 300px;
            }

            .avatar-small {
                width: 60px;
                height: 60px;
            }

            .bouncing-image {
                width: 60px;
                height: 60px;
            }

            .bg-star {
                font-size: 60px;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes meteor-fall {
            to {
                transform: translateY(100vh) translateX(200px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="background-stars" id="backgroundStars"></div>
    <svg id="constellation"></svg>

    <img src="https://i.imgur.com/XpM7lCA.png" alt="mimi" class="bouncing-image">
    <img src="https://i.imgur.com/Zm80C8Y.png" alt="mimi" class="bouncing-image">
    <img src="https://i.imgur.com/7ZaPhYb.png" alt="mimi" class="bouncing-image">
    <img src="https://i.imgur.com/ewJ7U3Z.png" alt="mimi" class="bouncing-image">

    <div class="container">
        <header>
            <a href="#" class="logo">
                <div class="star-symbol">⭐</div>
                star
            </a>
            <nav class="nav-links">
                <a href="#about">about</a>
                <a href="#?"> </a>
                <a href="#?"> </a>
            </nav>
        </header>

        <section class="hero" id="about">
            <div class="hero-content">
                <div class="star-title">
                    <h1>star</h1>
                    <img src="https://i.imgur.com/9Xb0E6N.jpeg" alt="Your avatar" class="avatar-small">
                </div>

                <p class="tagline">visible stars through glass window</p>

                <p class="bio">
                    cool 15 year old girl.
                </p>

                <div class="tech-stack">
                    <span class="tech-badge">Lua</span>
                    <span class="tech-badge">Creator</span>
                </div>

                <div class="cta-buttons">
                    <button class="btn btn-primary">Get Started</button>
                    <button class="btn btn-secondary">Learn More</button>
                </div>

                <div class="social-section">
                    <a href="https://x.com/ozam_gd" class="social-link" title="Twitter">
                        <img src="https://i.imgur.com/IOYwU73.png" alt="Twitter">
                    </a>
                    <a href="https://www.youtube.com/@1lyst4rr" class="social-link" title="YouTube">
                        <img src="https://i.imgur.com/D7B1SyC.png" alt="YouTube">
                    </a>
                    <a href="https://www.roblox.com/users/449367437/profile" class="social-link" title="Roblox">
                        <img src="https://i.imgur.com/u59wQGP.png" alt="Roblox">
                    </a>
                </div>
            </div>

            <div class="info-section">
                <div class="info-container">
                    <div class="info-text">
                        <p>a really cool 15 year old girl. i like coding and ui designing. i don't know what else to say, scroll down to send me messages i guess. oh yeah i really love mimi!!!</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const GRAVITY = 0.15;
        const BOUNCE_ELASTICITY = 1.0;
        const TERMINAL_VELOCITY = 8;

        const bouncingImagesPhysics = [];

        function createBackgroundStars() {
            const backgroundStars = document.getElementById('backgroundStars');
            const starCount = 8;
            const spacing = window.innerWidth / (starCount + 1);

            for (let i = 1; i <= starCount; i++) {
                const star = document.createElement('div');
                star.className = 'bg-star';
                star.textContent = '⭐';
                star.style.left = (spacing * i - 60) + 'px';
                star.style.top = Math.random() * (window.innerHeight - 200) + 'px';
                star.style.animationDelay = (Math.random() * 0.5) + 's';
                backgroundStars.appendChild(star);
            }
        }

        function initializeBouncingImages() {
            const images = document.querySelectorAll('.bouncing-image');
            images.forEach((img, index) => {
                bouncingImagesPhysics.push({
                    element: img,
                    x: Math.random() * (window.innerWidth - 80),
                    y: Math.random() * (window.innerHeight - 80),
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 2,
                    width: 80,
                    height: 80,
                    radius: 40
                });
            });
        }

        function updateBouncingPhysics() {
            bouncingImagesPhysics.forEach(img => {
                img.vy += GRAVITY;

                if (img.vy > TERMINAL_VELOCITY) {
                    img.vy = TERMINAL_VELOCITY;
                }

                img.x += img.vx;
                img.y += img.vy;

                if (img.x <= 0 || img.x >= window.innerWidth - img.width) {
                    img.vx *= -BOUNCE_ELASTICITY;
                    img.vx += (Math.random() - 0.5) * 15;
                    img.x = img.x <= 0 ? 0 : window.innerWidth - img.width;
                }

                if (img.y <= 0 || img.y >= window.innerHeight - img.height) {
                    img.vy *= -BOUNCE_ELASTICITY;
                    img.y = img.y <= 0 ? 0 : window.innerHeight - img.height;
                }

                img.element.style.left = img.x + 'px';
                img.element.style.top = img.y + 'px';
            });

            requestAnimationFrame(updateBouncingPhysics);
        }

        function createMeteorShower() {
            const meteorCount = Math.floor(Math.random() * 15) + 10;
            
            for (let i = 0; i < meteorCount; i++) {
                const meteor = document.createElement('div');
                meteor.className = 'meteor';
                
                const startX = Math.random() * window.innerWidth;
                const startY = -50;
                
                meteor.style.left = startX + 'px';
                meteor.style.top = startY + 'px';
                meteor.style.animation = `meteor-fall ${Math.random() * 2 + 1}s linear forwards`;
                meteor.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                document.body.appendChild(meteor);
                
                setTimeout(() => meteor.remove(), 3000);
            }
        }

        function triggerMeteorShowerRandomly() {
            setInterval(() => {
                if (Math.random() > 0.5) {
                    createMeteorShower();
                }
            }, Math.random() * 10000 + 8000);
        }

        window.addEventListener('load', () => {
            createBackgroundStars();
            initializeBouncingImages();
            updateBouncingPhysics();
            triggerMeteorShowerRandomly();
        });

        window.addEventListener('resize', () => {
            document.getElementById('backgroundStars').innerHTML = '';
            createBackgroundStars();
        });
    </script>
</body>
</html>
