<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>star</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/mmfpBkh.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --text: #ffffff;
  --text-muted: #888;
  --name-color: #5b9cf6;
  --dock-active: #5b9cf6;
  --card-bg: #111111;
  --card-border: rgba(255,255,255,0.07);
  --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
}

[data-theme="light"] {
  --bg: #f8f8f8;
  --text: #0a0a0a;
  --text-muted: #666;
  --name-color: #2563eb;
  --dock-active: #2563eb;
  --card-bg: #ffffff;
  --card-border: rgba(0,0,0,0.08);
}

html, body {
  width: 100%;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  transition: background 0.6s var(--ease-in-out), color 0.6s var(--ease-in-out);
  overflow: hidden;
}

.theme-toggle {
  position: fixed;
  top: 22px;
  right: 28px;
  z-index: 100;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 18px;
  padding: 6px;
  line-height: 1;
  border-radius: 50%;
  transition: color 0.35s var(--ease), transform 0.5s var(--ease-out), background 0.3s var(--ease);
}

.theme-toggle:hover {
  color: var(--text);
  transform: rotate(25deg) scale(1.15);
  background: rgba(255,255,255,0.06);
}

[data-theme="light"] .theme-toggle:hover {
  background: rgba(0,0,0,0.06);
}

.pages {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.page {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding: 80px 90px 120px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s var(--ease-in-out), transform 0.6s var(--ease-out), filter 0.6s var(--ease-in-out);
  transform: translateX(48px);
  filter: blur(10px);
  will-change: transform, opacity, filter;
}

.page.active {
  opacity: 1;
  pointer-events: all;
  transform: translateX(0);
  filter: blur(0);
}

.page.exit-left {
  opacity: 0;
  transform: translateX(-48px);
  filter: blur(10px);
}

#home .hello-text {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(72px, 10vw, 130px);
  color: var(--text);
  line-height: 1;
  margin-bottom: 18px;
  display: block;
  min-height: 1.1em;
}

.cursor {
  display: inline-block;
  width: 3px;
  height: 0.65em;
  background: var(--text);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 0.9s ease-in-out infinite;
  border-radius: 1px;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  45%, 55% { opacity: 0; }
}

#home .subtitle {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out);
  margin-bottom: 72px;
}

#home .subtitle.show {
  opacity: 1;
  transform: translateY(0);
}

.subtitle .name {
  color: var(--name-color);
  font-weight: 600;
}

.about-block {
  opacity: 0;
  transform: translateY(14px);
  filter: blur(4px);
  transition: opacity 0.7s var(--ease-out) 0.1s, transform 0.7s var(--ease-out) 0.1s, filter 0.7s var(--ease-out) 0.1s;
}

.about-block.show {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}

.about-block h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}

.about-block p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.8;
  max-width: 360px;
  font-weight: 300;
}

.about-block p strong {
  color: var(--text);
  font-weight: 600;
  text-decoration: underline;
  text-decoration-color: #f59e0b;
  text-underline-offset: 3px;
}

.ts-row {
  margin-top: 28px;
  display: flex;
  align-items: center;
  gap: 18px;
  opacity: 0;
  transform: translateY(14px);
  filter: blur(4px);
  transition: opacity 0.7s var(--ease-out) 0.28s, transform 0.7s var(--ease-out) 0.28s, filter 0.7s var(--ease-out) 0.28s;
}

.ts-row.show {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}

.ts-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ts-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.ts-val {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
}

.ts-sep {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,0.1);
  border-radius: 1px;
}

[data-theme="light"] .ts-sep {
  background: rgba(0,0,0,0.1);
}

#projects {
  overflow-y: auto;
  padding: 90px 72px 120px;
  scroll-behavior: smooth;
}

#projects::-webkit-scrollbar {
  width: 3px;
}

#projects::-webkit-scrollbar-track {
  background: transparent;
}

#projects::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  border-radius: 99px;
}

.projects-hero {
  margin-bottom: 44px;
}

.projects-hero h1 {
  font-size: 32px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}

.projects-hero p {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 300;
}

.projects-section {
  margin-bottom: 52px;
}

.projects-section-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.projects-section-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 20px;
  font-weight: 300;
}

.projects-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.proj-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: var(--text);
  overflow: hidden;
  transition: transform 0.35s var(--ease-out), box-shadow 0.35s var(--ease), border-color 0.3s var(--ease);
}

.proj-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  border-color: rgba(255,255,255,0.13);
}

[data-theme="light"] .proj-card:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,0.09);
  border-color: rgba(0,0,0,0.15);
}

.proj-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  display: block;
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid var(--card-border);
}

[data-theme="light"] .proj-thumb {
  background: rgba(0,0,0,0.04);
}

.proj-body {
  padding: 16px 18px 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.proj-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.proj-card-name-wrap {
  display: flex;
  align-items: center;
  gap: 5px;
}

.proj-card-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.proj-card-icons {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  margin-top: 1px;
}

.proj-card-icon-btn {
  color: var(--text-muted);
  opacity: 0.4;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  transition: opacity 0.25s var(--ease), transform 0.25s var(--ease-out), color 0.25s var(--ease);
}

.proj-card-icon-btn:hover {
  opacity: 0.9;
  transform: scale(1.1);
}

.proj-card-icon-btn svg {
  width: 13px;
  height: 13px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.proj-card:hover .proj-card-icon-btn {
  opacity: 0.55;
}

.proj-card-desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.65;
  font-weight: 300;
  flex: 1;
}

.proj-card-role {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 300;
}

.proj-card-role strong {
  color: var(--text);
  font-weight: 600;
}

.proj-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}

.proj-tag {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  border: 1px solid rgba(255,255,255,0.09);
  padding: 2px 8px;
  border-radius: 999px;
  transition: border-color 0.3s var(--ease);
}

.proj-card:hover .proj-tag {
  border-color: rgba(255,255,255,0.18);
}

[data-theme="light"] .proj-tag {
  border-color: rgba(0,0,0,0.11);
}

[data-theme="light"] .proj-card:hover .proj-tag {
  border-color: rgba(0,0,0,0.22);
}

.warn-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}

.warn-icon {
  display: inline-flex;
  align-items: center;
  cursor: default;
  color: #f59e0b;
  opacity: 0.6;
  transition: opacity 0.25s var(--ease), transform 0.3s var(--ease-out);
  line-height: 1;
  font-size: 0;
}

.warn-icon:hover {
  opacity: 1;
  transform: scale(1.15);
}

.warn-icon svg {
  width: 11px;
  height: 11px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
  display: block;
}

.warn-tooltip {
  position: absolute;
  top: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(-6px);
  background: #1c1c1c;
  border: 1px solid rgba(245,158,11,0.2);
  color: #e0e0e0;
  font-size: 10px;
  font-weight: 400;
  line-height: 1.6;
  padding: 8px 11px;
  border-radius: 8px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s var(--ease-out), transform 0.3s var(--ease-out);
  z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  white-space: normal;
  text-align: center;
  width: 200px;
}

[data-theme="light"] .warn-tooltip {
  background: #fff;
  border-color: rgba(245,158,11,0.3);
  color: #333;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}

.warn-tooltip::after {
  content: '';
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-bottom-color: #1c1c1c;
}

[data-theme="light"] .warn-tooltip::after {
  border-bottom-color: #fff;
}

.warn-wrap:hover .warn-tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.dock {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(22, 22, 22, 0.88);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  padding: 7px 9px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
  transition: box-shadow 0.4s var(--ease), background 0.6s var(--ease-in-out);
}

[data-theme="light"] .dock {
  background: rgba(210,210,210,0.85);
  border-color: rgba(0,0,0,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 1px 0 rgba(255,255,255,0.6) inset;
}

.dock-sep {
  width: 1px;
  height: 24px;
  background: rgba(255,255,255,0.09);
  margin: 0 3px;
  border-radius: 1px;
}

[data-theme="light"] .dock-sep {
  background: rgba(0,0,0,0.1);
}

.dock-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #bbb;
  position: relative;
  transition: background 0.3s var(--ease), color 0.3s var(--ease), transform 0.35s var(--ease-out), box-shadow 0.3s var(--ease);
}

[data-theme="light"] .dock-btn {
  background: rgba(0,0,0,0.07);
  color: #444;
}

.dock-btn:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
  transform: translateY(-3px) scale(1.08);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

[data-theme="light"] .dock-btn:hover {
  background: rgba(0,0,0,0.12);
  color: #000;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

.dock-btn:active {
  transform: translateY(-1px) scale(1.02);
  transition-duration: 0.1s;
}

.dock-btn.active {
  color: var(--dock-active);
}

.dock-btn.active::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--dock-active);
  opacity: 0.7;
}

.dock-btn svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.dock-btn.discord-btn svg,
.dock-btn.roblox-btn svg,
.dock-btn.x-btn svg {
  fill: currentColor;
  stroke: none;
}

@media (max-width: 980px) {
  .page {
    padding: 60px 28px 120px;
  }

  #projects {
    padding: 70px 28px 120px;
  }

  .projects-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

function buildIconSVG(type) {
  if (type === "link") return `<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>`;
  if (type === "github") return `<svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>`;
  return "";
}

function buildCard(card) {
  const el = card.link ? document.createElement("a") : document.createElement("div");
  el.className = "proj-card";

  if (card.link) {
    el.href = card.link;
    el.target = "_blank";
    el.rel = "noopener";
  }

  let html = "";

  if (card.thumb) {
    html += `<img class="proj-thumb" src="${card.thumb}" alt="${card.name} thumbnail" loading="lazy">`;
  }

  html += `<div class="proj-body">`;
  html += `<div class="proj-card-header">`;
  html += `<div class="proj-card-name-wrap">`;
  html += `<span class="proj-card-name">${card.name}</span>`;

  if (card.warn) {
    html += `<span class="warn-wrap">
      <span class="warn-icon">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </span>
      <span class="warn-tooltip">${card.warn}</span>
    </span>`;
  }

  html += `</div>`;
  html += `<div class="proj-card-icons">`;

  if (card.github) {
    html += `<button class="proj-card-icon-btn" title="GitHub" onclick="event.preventDefault();event.stopPropagation();window.open('${card.github}','_blank')">${buildIconSVG("github")}</button>`;
  }

  if (card.link) {
    html += `<span class="proj-card-icon-btn" style="cursor:default;">${buildIconSVG("link")}</span>`;
  }

  html += `</div>`;
  html += `</div>`;

  if (card.desc) html += `<div class="proj-card-desc">${card.desc}</div>`;
  if (card.role) html += `<div class="proj-card-role"><strong>Role:</strong> ${card.role}</div>`;

  if (card.tags && card.tags.length) {
    html += `<div class="proj-tags">${card.tags.map(tag => `<span class="proj-tag">${tag}</span>`).join("")}</div>`;
  }

  html += `</div>`;
  el.innerHTML = html;
  return el;
}

function renderSections() {
  const container = document.getElementById("projects-sections");
  container.innerHTML = "";

  SECTIONS.forEach(section => {
    if (!section.cards || section.cards.length === 0) return;

    const wrap = document.createElement("div");
    wrap.className = "projects-section";
    wrap.innerHTML = `
      <div class="projects-section-title">${section.title}</div>
      <div class="projects-section-sub">${section.sub}</div>
    `;

    const grid = document.createElement("div");
    grid.className = "projects-grid";

    section.cards.forEach(card => {
      grid.appendChild(buildCard(card));
    });

    wrap.appendChild(grid);
    container.appendChild(wrap);
  });
}

renderSections();

const BIRTHDAY = new Date("2010-08-16T00:00:00");

function tick() {
  const now = new Date();
  const years = Math.floor((now - BIRTHDAY) / (365.25 * 86400000));
  document.getElementById("age-el").textContent = `${years} yrs`;

  const nextBirthday = new Date(now.getFullYear(), 7, 16);
  if (nextBirthday < now) nextBirthday.setFullYear(now.getFullYear() + 1);

  const diff = nextBirthday - now;
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  document.getElementById("cd-el").textContent =
    days > 0 ? `${days}d ${hours}h ${minutes}m` : `${hours}h ${minutes}m ${seconds}s`;
}

tick();
setInterval(tick, 1000);

const word = "hello!";
const helloEl = document.getElementById("hello-el");
const cursor = document.createElement("span");
cursor.className = "cursor";

let helloIndex = 0;

function type() {
  if (helloIndex < word.length) {
    helloEl.textContent = word.slice(0, ++helloIndex);
    helloEl.appendChild(cursor);
    setTimeout(type, 100 + Math.random() * 80);
    return;
  }

  setTimeout(() => {
    cursor.remove();
    document.getElementById("subtitle-el").classList.add("show");

    setTimeout(() => {
      document.getElementById("about-el").classList.add("show");
      document.getElementById("ts-el").classList.add("show");
    }, 380);
  }, 320);
}

setTimeout(type, 400);

let currentPage = "home";

function goTo(id) {
  if (id === currentPage) return;

  const from = document.getElementById(currentPage);
  const to = document.getElementById(id);

  from.classList.remove("active");
  from.classList.add("exit-left");

  setTimeout(() => {
    from.classList.remove("exit-left");
  }, 620);

  setTimeout(() => {
    to.classList.add("active");
  }, 60);

  document.getElementById(`btn-${currentPage}`)?.classList.remove("active");
  document.getElementById(`btn-${id}`)?.classList.add("active");

  currentPage = id;
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  document.getElementById("theme-icon").textContent = isDark ? "☾" : "☀";
}
