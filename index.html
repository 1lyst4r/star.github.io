[data-theme="light"] {
  --background-color: #f8f8f8;
  --text-color: #0a0a0a;

  --accent-name-color: #2563eb;

}

html, body {
  width: 100%;
  min-height: 100vh;

  color: var(--text-color);
  font-family: 'Inter', sans-serif;

.background-video {

  will-change: opacity, transform;

.background-video.is-visible {

function resizeConfettiCanvas() {
  const scale = Math.min(window.devicePixelRatio || 1, 2);
  confettiCanvas.width = window.innerWidth * scale;
  confettiCanvas.height = window.innerHeight * scale;
  confettiContext.setTransform(scale, 0, 0, scale, 0, 0);
}

window.addEventListener("resize", resizeConfettiCanvas);
resizeConfettiCanvas();

function createConfettiPiece() {
  const colors = ["#ffffff", "#5b9cf6", "#f59e0b", "#22c55e", "#ef4444", "#a855f7", "#f472b6"];

  return {
    x: Math.random() * window.innerWidth,
    y: -30 - Math.random() * window.innerHeight * 0.7,
    width: 5 + Math.random() * 8,
    height: 10 + Math.random() * 14,
    color: colors[Math.floor(Math.random() * colors.length)],
    velocityX: -1.6 + Math.random() * 3.2,
    velocityY: 2 + Math.random() * 4.8,
    rotation: Math.random() * Math.PI * 2,
    rotationSpeed: -0.18 + Math.random() * 0.36,
    swing: Math.random() * Math.PI * 2
  };
}

function launchBirthdayConfetti() {
  resizeConfettiCanvas();
  confettiCanvas.classList.add("active");
  confettiPieces = Array.from({ length: 260 }, createConfettiPiece);
  confettiEndTime = performance.now() + 7200;

  if (!confettiAnimationFrame) {
    confettiAnimationFrame = requestAnimationFrame(animateConfetti);
  }
}

function animateConfetti(now) {
  confettiContext.clearRect(0, 0, window.innerWidth, window.innerHeight);

  if (now < confettiEndTime && confettiPieces.length < 460) {
    for (let i = 0; i < 9; i++) {
      confettiPieces.push(createConfettiPiece());
    }
  }

  confettiPieces.forEach((piece) => {
    piece.x += piece.velocityX + Math.sin(now / 240 + piece.swing) * 0.7;
    piece.y += piece.velocityY;
    piece.velocityY += 0.015;
    piece.rotation += piece.rotationSpeed;

    confettiContext.save();
    confettiContext.translate(piece.x, piece.y);
    confettiContext.rotate(piece.rotation);
    confettiContext.fillStyle = piece.color;
    confettiContext.fillRect(-piece.width / 2, -piece.height / 2, piece.width, piece.height);
    confettiContext.restore();
  });

  confettiPieces = confettiPieces.filter((piece) => piece.y < window.innerHeight + 60);

  if (confettiPieces.length || now < confettiEndTime) {
    confettiAnimationFrame = requestAnimationFrame(animateConfetti);
    return;
  }

  confettiContext.clearRect(0, 0, window.innerWidth, window.innerHeight);
  confettiCanvas.classList.remove("active");
  confettiAnimationFrame = null;
}
