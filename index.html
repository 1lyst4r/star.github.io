<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>star - home</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/mmfpBkh.jpeg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .audioPrompt {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 999;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .audioPrompt.hidden {
            display: none;
        }

        .promptTitle {
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            letter-spacing: 2px;
        }

        .promptButtons {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .promptBtn {
            padding: 16px 48px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid white;
            text-decoration: none;
            display: inline-block;
        }

        .enableBtn {
            background: white;
            color: black;
        }

        .enableBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
        }

        .disableBtn {
            background: black;
            color: white;
        }

        .disableBtn:hover {
            background: white;
            color: black;
        }

        #audioVisualizer {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 50;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: transform 0.05s ease-out;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid white;
            position: sticky;
            top: 0;
            z-index: 100;
            background: black;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            animation: slideInLeft 0.8s ease;
        }

        .starIcon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: rotateIcon 4s linear infinite, pulseIcon 2s ease-in-out infinite;
        }

        @keyframes rotateIcon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseIcon {
            0%, 100% { text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
            50% { text-shadow: 0 0 20px rgba(168, 85, 247, 0.8); }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .navMenu {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .navMenu a {
            color: #d1d5db;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .navMenu a:hover {
            color: #a855f7;
        }

        .hero {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            flex: 1;
            gap: 60px;
            padding: 60px 0;
        }

        .heroContent {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            flex: 1;
            max-width: 500px;
        }

        .titleGroup {
            position: relative;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .titleGroup h1 {
            font-size: 72px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideDown 1s ease;
            letter-spacing: 2px;
        }

        .profilePic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            animation: slideDown 1s ease 0.1s both;
            transition: all 0.3s ease;
        }

        .profilePic:hover {
            transform: scale(1.1);
        }

        .titleGroup::before {
            content: '⭐';
            position: absolute;
            font-size: 40px;
            left: -60px;
            animation: bounceUp 2s ease-in-out infinite;
            top: -10px;
        }

        @keyframes bounceUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .tagline {
            font-size: 24px;
            color: #a9b1d6;
            max-width: 600px;
            animation: fadeUp 1s ease 0.2s both;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tagline::after {
            content: ':3';
            font-size: 20px;
        }

        .description {
            font-size: 16px;
            color: #d1d5db;
            max-width: 700px;
            line-height: 1.8;
            animation: fadeUp 1s ease 0.3s both;
        }

        .skills {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            animation: fadeUp 1s ease 0.4s both;
        }

        .skillTag {
            background: black;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: default;
        }

        .skillTag:hover {
            background: white;
            color: black;
        }

        .buttonGroup {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            animation: fadeUp 1s ease 0.5s both;
        }

        .actionBtn {
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid white;
            text-decoration: none;
            display: inline-block;
        }

        .primaryBtn {
            background: white;
            color: black;
        }

        .primaryBtn:hover {
            transform: translateY(-2px);
            background: black;
            color: white;
        }

        .secondaryBtn {
            background: black;
            color: white;
            border: 2px solid white;
        }

        .secondaryBtn:hover {
            background: white;
            color: black;
        }

        .socials {
            display: flex;
            gap: 25px;
            animation: fadeUp 1s ease 0.6s both;
        }

        .socialIcon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            border: 2px solid white;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 24px;
            overflow: hidden;
        }

        .socialIcon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .socialIcon:hover {
            transform: translateY(-3px) scale(1.1);
        }

        .infoPanel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: slideRight 1s ease 0.3s both;
        }

        .infoPanelBox {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid white;
        }

        .infoPanelText {
            width: 100%;
            height: 100%;
            background: black;
            border-radius: 20px;
            padding: 30px;
            overflow-y: auto;
        }

        .infoPanelText::-webkit-scrollbar {
            width: 6px;
        }

        .infoPanelText::-webkit-scrollbar-track {
            background: transparent;
        }

        .infoPanelText::-webkit-scrollbar-thumb {
            background: white;
            border-radius: 3px;
        }

        .infoPanelText::-webkit-scrollbar-thumb:hover {
            background: white;
        }

        .infoPanelText p {
            color: #d1d5db;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 15px;
        }

        .infoPanelText p:last-child {
            margin-bottom: 0;
        }

        .muteBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            color: black;
            border: 2px solid white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .muteBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
        }

        .muteBtn.muted {
            background: black;
            color: white;
        }

        @media (max-width: 1024px) {
            .hero {
                flex-direction: column;
                gap: 40px;
            }

            .heroContent {
                align-items: center;
                text-align: center;
            }

            .titleGroup {
                justify-content: center;
            }

            .titleGroup::before {
                left: -50px;
            }

            .buttonGroup {
                justify-content: center;
            }

            .socials {
                justify-content: center;
            }

            .infoPanel {
                max-width: 600px;
                margin: 0 auto;
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 42px;
            }

            .tagline {
                font-size: 18px;
            }

            .titleGroup::before {
                font-size: 24px;
                left: -40px;
            }

            .navMenu {
                gap: 10px;
            }

            .navMenu a {
                font-size: 12px;
            }

            .buttonGroup {
                flex-direction: column;
                width: 100%;
            }

            .actionBtn {
                width: 100%;
            }

            .infoPanel {
                max-width: 100%;
            }

            .infoPanelText {
                height: 300px;
            }

            .profilePic {
                width: 60px;
                height: 60px;
            }

            .muteBtn {
                width: 50px;
                height: 50px;
                bottom: 20px;
                right: 20px;
                font-size: 22px;
            }

            .promptTitle {
                font-size: 32px;
            }

            .promptBtn {
                padding: 12px 32px;
                font-size: 16px;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="audioPrompt" id="audioPrompt">
        <div class="promptTitle">enable audio</div>
        <div class="promptButtons">
            <button class="promptBtn enableBtn" id="enableAudioBtn">Enable audio!</button>
            <button class="promptBtn disableBtn" id="disableAudioBtn">I don't want audio.</button>
        </div>
    </div>

    <canvas id="audioVisualizer"></canvas>

    <button class="muteBtn" id="muteBtn" title="Mute/Unmute">🔊</button>

    <audio id="audio" crossorigin="anonymous">
        <source src="" type="audio/mpeg">
    </audio>

    <div class="container" id="mainContainer">
        <header>
            <a href="#" class="logo">
                <div class="starIcon">⭐</div>
                star
            </a>
            <nav class="navMenu">
                <a href="#about">about</a>
                <a href="#?"> </a>
                <a href="#?"> </a>
            </nav>
        </header>

        <section class="hero" id="about">
            <div class="heroContent">
                <div class="titleGroup">
                    <h1>star</h1>
                    <img src="https://i.imgur.com/9Xb0E6N.jpeg" alt="Your avatar" class="profilePic">
                </div>

                <p class="tagline">visible stars through glass window</p>

                <p class="description">
                    cool 15 year old girl.
                </p>

                <div class="skills">
                    <span class="skillTag">Lua</span>
                    <span class="skillTag">Creator</span>
                </div>

                <div class="buttonGroup">
                    <button class="actionBtn primaryBtn">?</button>
                    <button class="actionBtn secondaryBtn">?</button>
                </div>

                <div class="socials">
                    <a href="https://x.com/ozam_gd" class="socialIcon" title="Twitter">
                        <img src="https://i.imgur.com/IOYwU73.png" alt="Twitter">
                    </a>
                    <a href="https://www.youtube.com/@1lyst4rr" class="socialIcon" title="YouTube">
                        <img src="https://i.imgur.com/D7B1SyC.png" alt="YouTube">
                    </a>
                    <a href="https://www.roblox.com/users/449367437/profile" class="socialIcon" title="Roblox">
                        <img src="https://i.imgur.com/u59wQGP.png" alt="Roblox">
                    </a>
                </div>
            </div>

            <div class="infoPanel">
                <div class="infoPanelBox">
                    <div class="infoPanelText">
                        <p>a really cool 15 year old girl. i like coding and ui designing. i don't know what else to say, scroll down to send me messages i guess. oh yeah i really love mimi!!!</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let isAudioMuted = false;
        let audioEnabled = false;

        const playlist = [
            { url: 'https://files.catbox.moe/v6tq1e.mp3', bpm: 155 },
            { url: 'https://files.catbox.moe/qm1jkq.mp3', bpm: 141 }
        ];

        let currentTrack = 0;
        const audioElement = document.getElementById('audio');
        const muteButton = document.getElementById('muteBtn');
        const mainContainer = document.getElementById('mainContainer');
        const canvas = document.getElementById('audioVisualizer');
        const canvasCtx = canvas.getContext('2d');
        const audioPrompt = document.getElementById('audioPrompt');
        const enableAudioBtn = document.getElementById('enableAudioBtn');
        const disableAudioBtn = document.getElementById('disableAudioBtn');

        let audioCtx;
        let analyser;
        let dataArray;
        let currentBPM = 155;

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                const source = audioCtx.createMediaElementAudioSource(audioElement);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function drawVisualizer() {
            if (!analyser) return;

            analyser.getByteFrequencyData(dataArray);

            canvasCtx.fillStyle = 'rgba(10, 10, 10, 0.15)';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let barHeight;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                barHeight = (dataArray[i] / 255) * canvas.height;

                const hue = (i / dataArray.length) * 360;
                canvasCtx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

                x += barWidth + 1;
            }

            requestAnimationFrame(drawVisualizer);
        }

        function getAverageFrequency() {
            if (!dataArray) return 0;
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            return sum / dataArray.length;
        }

        function updateBeatZoom() {
            const beatInterval = (60 / currentBPM) * 1000;
            const beatPosition = (audioElement.currentTime * 1000) % beatInterval;
            const beatPhase = beatPosition / beatInterval;

            const avgFreq = getAverageFrequency();
            const freqMultiplier = (avgFreq / 255) * 0.03;

            const zoomAmount = 1 + Math.sin(beatPhase * Math.PI * 2) * 0.06 + freqMultiplier;
            mainContainer.style.transform = `scale(${zoomAmount})`;
        }

        function animateZoom() {
            updateBeatZoom();
            requestAnimationFrame(animateZoom);
        }

        function setupAudio() {
            const currentSong = playlist[currentTrack];
            audioElement.src = currentSong.url;
            currentBPM = currentSong.bpm;

            audioElement.addEventListener('ended', () => {
                currentTrack = (currentTrack + 1) % playlist.length;
                setupAudio();
                if (!isAudioMuted && audioEnabled) {
                    audioElement.play();
                }
            });
        }

        function toggleAudioMute() {
            isAudioMuted = !isAudioMuted;

            if (isAudioMuted) {
                audioElement.pause();
                muteButton.textContent = '🔇';
                muteButton.classList.add('muted');
            } else {
                audioElement.play();
                muteButton.textContent = '🔊';
                muteButton.classList.remove('muted');
            }
        }

        enableAudioBtn.addEventListener('click', () => {
            audioEnabled = true;
            audioPrompt.classList.add('hidden');
            initAudioContext();
            setupAudio();
            audioElement.play();
            drawVisualizer();
            animateZoom();
        });

        disableAudioBtn.addEventListener('click', () => {
            audioEnabled = false;
            audioPrompt.classList.add('hidden');
            muteButton.style.display = 'none';
        });

        muteButton.addEventListener('click', toggleAudioMute);

        window.addEventListener('load', () => {
            resizeCanvas();
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
        });
    </script>
</body>
</html>
