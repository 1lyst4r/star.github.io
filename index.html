<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>star</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page {
            width: 100%;
            min-height: 100vh;
            display: none;
            flex-direction: column;
            padding: 60px 80px;
            position: relative;
        }

        .page.active {
            display: flex;
        }

        .home-page {
            justify-content: flex-start;
            max-width: 600px;
        }

        .hello {
            font-size: 120px;
            font-style: italic;
            font-weight: 300;
            color: #fff;
            line-height: 1;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        .name-section {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 80px;
        }

        .intro-text {
            font-size: 18px;
            color: #d1d5db;
        }

        .name-star {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 18px;
            font-weight: 600;
        }

        .about-intro {
            margin-bottom: 120px;
        }

        .about-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
        }

        .about-text {
            font-size: 16px;
            line-height: 1.8;
            color: #d1d5db;
            max-width: 700px;
        }

        .highlight {
            color: #fff;
            font-weight: 600;
            position: relative;
            display: inline;
        }

        .highlight.underline {
            border-bottom: 2px solid #fbbf24;
            padding-bottom: 2px;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            position: fixed;
            bottom: 40px;
            left: 80px;
        }

        .nav-button {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .nav-button:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            transform: translateY(-3px);
        }

        .projects-page {
            max-width: 1200px;
        }

        .section-title {
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
        }

        .section-subtitle {
            color: #9ca3af;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 80px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            transform: translateY(-4px);
        }

        .project-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
        }

        .project-desc {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .project-role {
            color: #d1d5db;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .project-role strong {
            color: #fff;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .empty-text {
            font-size: 16px;
            color: #d1d5db;
        }

        @media (max-width: 768px) {
            .page {
                padding: 40px 20px;
            }

            .hello {
                font-size: 80px;
            }

            .section-title {
                font-size: 28px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .nav-buttons {
                left: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Home Page -->
    <div class="page home-page active" id="homePage">
        <div class="hello">hello</div>
        
        <div class="name-section">
            <span class="intro-text">My name is</span>
            <div class="name-star">star</div>
        </div>

        <div class="about-intro">
            <h2 class="about-title">About Me</h2>
            <p class="about-text">
                I'm a <span class="highlight underline">15 year old</span> 
                <span class="highlight underline">dumb</span> girl that has 
                <span class="highlight underline">0 creativity</span> at all
            </p>
        </div>
    </div>

    <!-- Projects Page -->
    <div class="page projects-page" id="projectsPage">
        <div style="margin-bottom: 100px;">
            <h2 class="section-title">Projects</h2>
            <p class="section-subtitle">A collection of things I've built.</p>
            <p class="empty-text">None so far</p>
        </div>

        <div style="margin-bottom: 100px;">
            <h2 class="section-title">Contributions</h2>
            <p class="section-subtitle">Projects I've contributed to.</p>

            <div class="projects-grid">
                <div class="project-card">
                    <div class="project-title">Sample Project</div>
                    <div class="project-desc">A sample contribution to demonstrate the layout.</div>
                    <div class="project-role">Role: <strong>Contributor</strong></div>
                    <div class="tags">
                        <span class="tag">Lua</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-buttons">
        <a class="nav-button" href="#" onclick="goToPage('home'); return false;" title="Home">🏠</a>
        <a class="nav-button" href="#" onclick="goToPage('projects'); return false;" title="Projects">🔧</a>
        <a class="nav-button" href="https://github.com" target="_blank" title="GitHub">🐙</a>
        <a class="nav-button" href="https://discord.com" target="_blank" title="Discord">💬</a>
    </div>

    <script>
        function goToPage(pageName) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));
            
            if (pageName === 'home') {
                document.getElementById('homePage').classList.add('active');
            } else if (pageName === 'projects') {
                document.getElementById('projectsPage').classList.add('active');
            }
        }
    </script>
</body>
</html>
