<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>star</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .page.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* HOME PAGE */
        .home-page {
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .intro-container {
            text-align: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .intro-container.move {
            transform: translateY(-200px) translateX(-300px);
            text-align: left;
        }

        .hello {
            font-size: 120px;
            font-style: italic;
            font-weight: 300;
            color: #fff;
            letter-spacing: 2px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .intro-container.move .hello {
            justify-content: flex-start;
            font-size: 80px;
            min-height: auto;
        }

        .intro {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
            opacity: 0;
            animation: slideIn 0.8s ease-out 1.5s forwards;
        }

        .intro-container.move .intro {
            justify-content: flex-start;
        }

        .intro-text {
            font-size: 28px;
            color: #d1d5db;
            font-weight: 400;
        }

        .name-star {
            position: relative;
            background: linear-gradient(90deg, #fbbf24, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
            font-weight: 600;
            display: inline-block;
        }

        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fbbf24;
            border-radius: 50%;
            box-shadow: 0 0 6px #fbbf24;
            opacity: 0;
        }

        @keyframes sparklePopIn {
            0% {
                opacity: 0;
                transform: scale(0) translate(-50%, -50%);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(0.5) translate(-50%, -50%);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .about-intro {
            margin-top: 100px;
            opacity: 0;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInAbout 0.8s ease-out 2.3s forwards;
        }

        .intro-container.move .about-intro {
            opacity: 1;
            text-align: left;
            animation: none;
            margin-top: 80px;
        }

        @keyframes fadeInAbout {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .about-title {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
        }

        .about-text {
            font-size: 16px;
            line-height: 1.8;
            color: #d1d5db;
            max-width: 600px;
        }

        .intro-container.move .about-text {
            max-width: 100%;
        }

        .highlight {
            color: #fff;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }

        .underline {
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: #fbbf24;
            border-radius: 1px;
        }

        .nav-container {
            margin-top: 80px;
            opacity: 0;
            transition: opacity 0.6s ease-out 3s;
            display: flex;
            justify-content: center;
        }

        .intro-container.move .nav-container {
            opacity: 1;
            justify-content: flex-start;
        }

        .nav-pill {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 12px 16px;
            backdrop-filter: blur(10px);
        }

        .nav-button {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-button:hover {
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
            transform: translateY(-2px);
        }

        /* PROJECTS PAGE */
        .projects-page {
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 80px 40px 120px 40px;
            overflow-y: auto;
        }

        .projects-content {
            max-width: 1200px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 40px;
            width: 100%;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            background: rgba(251, 191, 36, 0.1);
            border-color: #fbbf24;
            transform: translateY(-4px);
        }

        .project-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .project-desc {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .project-role {
            color: #d1d5db;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .project-role strong {
            color: #fff;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .section-title {
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        .section-subtitle {
            color: #9ca3af;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .empty-text {
            font-size: 18px;
            color: #d1d5db;
            margin-top: 20px;
        }

        .projects-nav-container {
            position: fixed;
            bottom: 40px;
            left: 40px;
        }

        .projects-nav-pill {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 12px 16px;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .hello {
                font-size: 70px;
            }

            .intro-text,
            .name-star {
                font-size: 20px;
            }

            .about-title {
                font-size: 24px;
            }

            .section-title {
                font-size: 28px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .intro-container.move {
                transform: translateY(-150px) translateX(-100px);
            }

            .nav-button {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="page home-page active" id="homePage">
        <div class="intro-container" id="introContainer">
            <div class="hello" id="helloText"></div>
            <div class="intro">
                <span class="intro-text">My name is</span>
                <div class="name-star" id="nameStar">
                    star
                    <div class="sparkles" id="sparklesContainer"></div>
                </div>
            </div>

            <div class="about-intro">
                <h2 class="about-title">About Me</h2>
                <p class="about-text">
                    I'm a <span class="highlight">15 year old<span class="underline"></span></span> 
                    <span class="highlight">dumb<span class="underline"></span></span> girl that has 
                    <span class="highlight">0 creativity<span class="underline"></span></span> at all
                </p>
            </div>

            <div class="nav-container">
                <div class="nav-pill">
                    <button class="nav-button" id="homeBtn" title="Home" onclick="goToPage('home')">🏠</button>
                    <button class="nav-button" id="projectsBtn" title="Projects" onclick="goToPage('projects')">🔧</button>
                    <button class="nav-button" id="githubBtn" title="GitHub" onclick="window.open('https://github.com', '_blank')">🐙</button>
                    <button class="nav-button" id="discordBtn" title="Discord" onclick="window.open('https://discord.com', '_blank')">💬</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Projects Page -->
    <div class="page projects-page" id="projectsPage">
        <div class="projects-content">
            <div style="margin-bottom: 40px;">
                <h2 class="section-title">Projects</h2>
                <p class="section-subtitle">A collection of things I've built.</p>
                <p class="empty-text">None so far</p>
            </div>

            <div style="margin-bottom: 60px;">
                <h2 class="section-title">Contributions</h2>
                <p class="section-subtitle">Projects I've contributed to.</p>

                <div class="projects-grid">
                    <div class="project-card">
                        <div class="project-title">Sample Project</div>
                        <div class="project-desc">A sample contribution to demonstrate the layout.</div>
                        <div class="project-role">Role: <strong>Contributor</strong></div>
                        <div class="tags">
                            <span class="tag">Lua</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="projects-nav-container">
            <div class="projects-nav-pill">
                <button class="nav-button" id="homeBtn2" title="Home" onclick="goToPage('home')">🏠</button>
                <button class="nav-button" id="projectsBtn2" title="Projects">🔧</button>
                <button class="nav-button" id="githubBtn2" title="GitHub" onclick="window.open('https://github.com', '_blank')">🐙</button>
                <button class="nav-button" id="discordBtn2" title="Discord" onclick="window.open('https://discord.com', '_blank')">💬</button>
            </div>
        </div>
    </div>

    <script>
        const helloText = document.getElementById('helloText');
        const introContainer = document.getElementById('introContainer');
        const sparklesContainer = document.getElementById('sparklesContainer');
        const nameStar = document.getElementById('nameStar');

        // Smooth typewriter effect for "hello"
        function typeWrite() {
            const text = 'hello';
            let index = 0;
            helloText.textContent = '';

            const typeInterval = setInterval(() => {
                if (index < text.length) {
                    helloText.textContent += text[index];
                    index++;
                } else {
                    clearInterval(typeInterval);
                    // Start sparkles and intro animation after typewriter finishes
                    setTimeout(() => {
                        createSparkles();
                        startSparkleAnimation();
                    }, 300);
                }
            }, 80); // Smooth typing speed
        }

        // Create sparkles around "star" text
        function createSparkles() {
            sparklesContainer.innerHTML = '';
            const sparkleCount = 12;

            for (let i = 0; i < sparkleCount; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';

                const angle = (i / sparkleCount) * Math.PI * 2;
                const distance = 35;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;

                sparkle.style.left = (50 + x) + '%';
                sparkle.style.top = (50 + y) + '%';
                sparkle.style.transform = 'translate(-50%, -50%)';

                sparklesContainer.appendChild(sparkle);
            }
        }

        // Animate sparkles popping in and out
        function startSparkleAnimation() {
            const sparkles = sparklesContainer.querySelectorAll('.sparkle');
            let sparkleIndex = 0;

            const sparkleInterval = setInterval(() => {
                if (sparkleIndex < sparkles.length) {
                    const sparkle = sparkles[sparkleIndex];
                    const duration = 600 + Math.random() * 400; // 600-1000ms
                    
                    sparkle.style.animation = `sparklePopIn ${duration}ms ease-out forwards`;
                    sparkle.style.animationDelay = Math.random() * 800 + 'ms';
                    
                    sparkleIndex++;
                } else {
                    // Loop the animation
                    sparkleIndex = 0;
                }
            }, 100);

            // Continue looping sparkles
            setTimeout(() => {
                clearInterval(sparkleInterval);
                // Restart the loop
                const loopSparkles = () => {
                    sparkles.forEach(sparkle => {
                        const duration = 600 + Math.random() * 400;
                        sparkle.style.animation = `sparklePopIn ${duration}ms ease-out`;
                        sparkle.style.animationDelay = Math.random() * 1200 + 'ms';
                    });
                };
                loopSparkles();
                setInterval(loopSparkles, 2500);
            }, 2000);
        }

        function goToPage(pageName) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));

            if (pageName === 'home') {
                document.getElementById('homePage').classList.add('active');
                introContainer.classList.remove('move');
            } else if (pageName === 'projects') {
                document.getElementById('projectsPage').classList.add('active');
            }
        }

        // Start the animation sequence
        typeWrite();

        // Move intro after 3.5 seconds
        setTimeout(() => {
            introContainer.classList.add('move');
        }, 3500);
    </script>
</body>
</html>
