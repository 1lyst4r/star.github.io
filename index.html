<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>star</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }

        .page {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
        }

        .page.active {
            opacity: 1;
            pointer-events: auto;
        }

        .home-page {
            flex-direction: column;
        }

        .intro-container {
            text-align: center;
            transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .intro-container.move {
            transform: translateY(-120px);
            opacity: 0.7;
            filter: blur(8px);
        }

        .hello {
            font-size: 120px;
            font-style: italic;
            font-weight: 300;
            color: #fff;
            letter-spacing: -2px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hello-char {
            opacity: 0;
            animation: typeWrite 0.08s ease-out forwards;
        }

        @keyframes typeWrite {
            to {
                opacity: 1;
            }
        }

        .intro {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
            opacity: 0;
            animation: slideIn 0.8s ease-out 1.8s forwards;
        }

        .intro-text {
            font-size: 20px;
            color: #d1d5db;
            font-weight: 400;
        }

        .name-star {
            position: relative;
            background: linear-gradient(90deg, #fbbf24, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 20px;
            font-weight: 600;
        }

        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fbbf24;
            border-radius: 50%;
            animation: sparkleAnim 2s ease-in-out infinite;
        }

        @keyframes sparkleAnim {
            0%, 100% { 
                opacity: 0;
                transform: scale(0);
            }
            50% { 
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .about-intro {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .intro-container.move .about-intro {
            opacity: 1;
            pointer-events: auto;
        }

        .about-title {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
        }

        .about-text {
            font-size: 16px;
            line-height: 1.8;
            color: #d1d5db;
            max-width: 500px;
        }

        .highlight {
            color: #fff;
            font-weight: 600;
            position: relative;
            display: inline-block;
        }

        .underline {
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: #fbbf24;
            border-radius: 1px;
        }

        .nav-buttons {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.6s ease-out 2.6s;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 20px;
            z-index: 100;
        }

        .nav-buttons.visible {
            opacity: 1;
        }

        .nav-button {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-button:hover {
            background: rgba(251, 191, 36, 0.15);
            border-color: #fbbf24;
            transform: translateY(-2px);
        }

        .projects-page {
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 80px 60px;
            overflow-y: auto;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 40px;
            width: 100%;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            background: rgba(251, 191, 36, 0.1);
            border-color: #fbbf24;
            transform: translateY(-4px);
        }

        .project-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .project-desc {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .project-role {
            color: #d1d5db;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .project-role strong {
            color: #fff;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .section-title {
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        .section-subtitle {
            color: #9ca3af;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .empty-text {
            font-size: 18px;
            color: #d1d5db;
            margin-top: 20px;
        }

        .projects-nav-buttons {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 12px 20px;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .hello {
                font-size: 70px;
            }

            .intro-text,
            .name-star {
                font-size: 16px;
            }

            .about-title {
                font-size: 24px;
            }

            .section-title {
                font-size: 28px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .projects-page {
                padding: 60px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="page home-page active" id="homePage">
        <div class="intro-container" id="introContainer">
            <div class="hello" id="hello"></div>
            <div class="intro">
                <span class="intro-text">My name is</span>
                <div class="name-star">
                    star
                    <div class="sparkles" id="sparklesContainer"></div>
                </div>
            </div>

            <div class="about-intro">
                <h2 class="about-title">About Me</h2>
                <p class="about-text">
                    I'm a <span class="highlight">15 year old<span class="underline"></span></span> 
                    <span class="highlight">dumb<span class="underline"></span></span> girl that has 
                    <span class="highlight">0 creativity<span class="underline"></span></span> at all
                </p>
            </div>

            <div class="nav-buttons" id="navButtons">
                <button class="nav-button" id="homeBtn" title="Home">🏠</button>
                <button class="nav-button" id="projectsBtn" title="Projects" onclick="goToPage('projects')">🔧</button>
                <button class="nav-button" id="githubBtn" title="GitHub" onclick="window.open('https://github.com', '_blank')">🐙</button>
                <button class="nav-button" id="discordBtn" title="Discord" onclick="window.open('https://discord.com', '_blank')">💬</button>
            </div>
        </div>
    </div>

    <!-- Projects Page -->
    <div class="page projects-page" id="projectsPage">
        <div style="width: 100%; max-width: 1200px;">
            <div style="margin-bottom: 40px;">
                <h2 class="section-title">Projects</h2>
                <p class="section-subtitle">A collection of things I've built.</p>
                <p class="empty-text">None so far</p>
            </div>

            <div style="margin-bottom: 60px;">
                <h2 class="section-title">Contributions</h2>
                <p class="section-subtitle">Projects I've contributed to.</p>

                <div class="projects-grid">
                    <div class="project-card">
                        <div class="project-title">Sample Project</div>
                        <div class="project-desc">A sample contribution to demonstrate the layout.</div>
                        <div class="project-role">Role: <strong>Contributor</strong></div>
                        <div class="tags">
                            <span class="tag">Lua</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="projects-nav-buttons">
                <button class="nav-button" id="homeBtn2" title="Home" onclick="goToPage('home')">🏠</button>
                <button class="nav-button" id="projectsBtn2" title="Projects">🔧</button>
                <button class="nav-button" id="githubBtn2" title="GitHub" onclick="window.open('https://github.com', '_blank')">🐙</button>
                <button class="nav-button" id="discordBtn2" title="Discord" onclick="window.open('https://discord.com', '_blank')">💬</button>
            </div>
        </div>
    </div>

    <script>
        function createSparkles() {
            const container = document.getElementById('sparklesContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                
                const angle = (i / 8) * Math.PI * 2;
                const distance = 28;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                
                sparkle.style.left = (50 + x) + '%';
                sparkle.style.top = (50 + y) + '%';
                sparkle.style.animationDelay = (i * 0.2) + 's';
                
                container.appendChild(sparkle);
            }
        }

        function typewriteHello() {
            const hello = document.getElementById('hello');
            const text = 'hello';
            hello.innerHTML = '';
            
            let delay = 0;
            for (let char of text) {
                const span = document.createElement('span');
                span.className = 'hello-char';
                span.textContent = char;
                span.style.animationDelay = (delay * 0.08) + 's';
                hello.appendChild(span);
                delay++;
            }
        }

        function goToPage(pageName) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));
            
            if (pageName === 'home') {
                document.getElementById('homePage').classList.add('active');
                const introContainer = document.getElementById('introContainer');
                introContainer.classList.remove('move');
                document.getElementById('navButtons').classList.remove('visible');
            } else if (pageName === 'projects') {
                document.getElementById('projectsPage').classList.add('active');
            }
        }

        // Start typewriter effect immediately
        typewriteHello();
        
        // Show nav buttons after intro animation completes
        setTimeout(() => {
            document.getElementById('navButtons').classList.add('visible');
        }, 2600);

        // Trigger the blur and move animation
        setTimeout(() => {
            const introContainer = document.getElementById('introContainer');
            introContainer.classList.add('move');
        }, 3500);

        createSparkles();
    </script>
</body>
</html>
